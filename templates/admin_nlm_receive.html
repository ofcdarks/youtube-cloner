<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NotebookLM — Salvando...</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#020617;font-family:'Inter',system-ui,sans-serif;color:#e4e4e7;display:flex;justify-content:center;align-items:center;min-height:100vh}
.card{background:#0e1223;border:1px solid #1e293b;border-radius:12px;padding:40px;width:420px;text-align:center}
h2{font-size:1.3em;color:#f8fafc;margin-bottom:8px}
p{color:#64748b;font-size:13px;margin-bottom:16px}
.spinner{width:40px;height:40px;border:3px solid #1e293b;border-top:3px solid #7c3aed;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.success{color:#22c55e;font-size:40px;margin-bottom:12px}
.error{color:#ef4444;font-size:14px;background:rgba(239,68,68,.1);padding:12px;border-radius:8px;margin-top:12px}
a{color:#7c3aed;text-decoration:none}
</style>
</head>
<body>
<div class="card">
    <div id="loading">
        <div class="spinner"></div>
        <h2>Salvando credenciais...</h2>
        <p>Capturando cookies do NotebookLM</p>
    </div>
    <div id="success" style="display:none">
        <div class="success">&#10003;</div>
        <h2>NotebookLM conectado!</h2>
        <p>Redirecionando...</p>
    </div>
    <div id="error-box" style="display:none">
        <h2 style="color:#ef4444">Erro</h2>
        <div class="error" id="error-msg"></div>
        <p style="margin-top:12px"><a href="/admin/notebooklm">Voltar e tentar novamente</a></p>
    </div>
</div>
<script>
(function() {
    var hash = window.location.hash.substring(1);
    if (!hash) {
        showError('Nenhum dado recebido. Clique no bookmarklet estando na pagina do NotebookLM.');
        return;
    }

    var json;
    try {
        json = decodeURIComponent(escape(atob(hash)));
        JSON.parse(json);
    } catch(e) {
        showError('Dados invalidos: ' + e.message);
        return;
    }

    // Send with credentials:include — browser sends httpOnly session cookie automatically
    fetch('/api/admin/nlm-save-credentials', {
        method: 'POST',
        credentials: 'include',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({storage_state: json})
    })
    .then(function(r) {
        if (r.status === 401) {
            showError('Sessao expirada. <a href="/login">Faca login</a>, depois volte ao NotebookLM e clique no bookmarklet novamente.');
            return null;
        }
        return r.json();
    })
    .then(function(data) {
        if (!data) return;
        if (data.ok) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('success').style.display = '';
            try { sessionStorage.setItem('nlm_saved', 'ok'); } catch(e) {}
            setTimeout(function() { window.location.href = '/admin/notebooklm'; }, 1500);
        } else {
            showError(data.error || 'Falha ao salvar credenciais');
        }
    })
    .catch(function(e) {
        showError('Erro de conexao: ' + e.message);
    });

    function showError(msg) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error-box').style.display = '';
        document.getElementById('error-msg').innerHTML = msg;
    }
})();
</script>
</body>
</html>
