<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YT Cloner - La Casa Dark Core</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

*{margin:0;padding:0;box-sizing:border-box}

body {
    background-color: #000;
    background-image: url('/static/img/login_bg.png');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    color: #e4e4e7;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    position: relative;
}

body::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at center, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.9) 100%);
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
    z-index: 1;
}

.login-wrapper {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 440px;
    padding: 0 20px;
}

.login-box {
    background: rgba(15, 15, 18, 0.85);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255, 255, 255, 0.05);
    box-shadow: 0 24px 64px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.05);
    border-radius: 16px;
    padding: 40px 32px;
    text-align: center;
    animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

@keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

.badge-top {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(245, 158, 11, 0.1);
    border: 1px solid rgba(245, 158, 11, 0.3);
    color: #fbbf24;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-bottom: 24px;
    text-transform: uppercase;
}

.login-avatar {
    width: 80px;
    height: 80px;
    background: #000;
    border: 2px solid #f59e0b;
    border-radius: 50%;
    margin: 0 auto 16px;
    box-shadow: 0 0 24px rgba(245, 158, 11, 0.3);
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 32px;
    color: #f59e0b;
}

.login-box h1 {
    font-size: 1.5em;
    color: #f8fafc;
    font-weight: 800;
    letter-spacing: -0.5px;
    margin-bottom: 2px;
    text-transform: uppercase;
}

.login-box .core-text {
    font-size: 16px;
    color: #f59e0b;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 12px;
}

.login-box p {
    color: #94a3b8;
    font-size: 13px;
    margin-bottom: 32px;
    line-height: 1.5;
}

.input-group {
    text-align: left;
    margin-bottom: 16px;
}

.input-group label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: #cbd5e1;
    margin-bottom: 8px;
    letter-spacing: 0.3px;
}

.login-box input {
    width: 100%;
    padding: 14px 16px;
    background: #17171a;
    border: 1px solid #27272a;
    border-radius: 8px;
    color: #f8fafc;
    font-size: 14px;
    outline: none;
    font-family: inherit;
    transition: all 0.2s ease;
}

.login-box input::placeholder {
    color: #52525b;
}

.login-box input:focus {
    border-color: #f59e0b;
    box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.15);
}

.forgot-link {
    display: block;
    text-align: left;
    font-size: 11px;
    color: #f59e0b;
    text-decoration: none;
    font-weight: 600;
    margin-bottom: 24px;
    transition: color 0.2s;
}

.forgot-link:hover {
    color: #fbbf24;
}

.btn-orange {
    width: 100%;
    padding: 14px;
    background: linear-gradient(90deg, #f59e0b, #ea580c);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: inherit;
    box-shadow: 0 4px 16px rgba(234, 88, 12, 0.4);
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
}

.btn-orange:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 24px rgba(234, 88, 12, 0.6);
    filter: brightness(1.1);
}

.divider {
    display: flex;
    align-items: center;
    text-align: center;
    color: #52525b;
    font-size: 11px;
    margin: 24px 0;
}
.divider::before, .divider::after {
    content: '';
    flex: 1;
    border-bottom: 1px solid #27272a;
}
.divider::not(:empty)::before { margin-right: .5em; }
.divider::not(:empty)::after { margin-left: .5em; }

.btn-google {
    width: 100%;
    padding: 12px;
    background: #18191c;
    border: 1px solid #27272a;
    border-radius: 8px;
    color: #e4e4e7;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: inherit;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
}

.btn-google:hover {
    background: #27272a;
}

.footer-text {
    margin-top: 32px;
    font-size: 11px;
    color: #71717a;
    line-height: 1.6;
}

.footer-text a {
    color: #f59e0b;
    text-decoration: none;
    font-weight: 600;
}

.login-error {
    background: rgba(239, 68, 68, 0.15);
    border: 1px solid rgba(239, 68, 68, 0.3);
    color: #fca5a5;
    padding: 12px;
    border-radius: 8px;
    margin-bottom: 20px;
    font-size: 13px;
    font-weight: 500;
}
</style>
</head>
<body>
<div class="login-wrapper">
    <div class="login-box">
        
        <div class="badge-top">&#128274; PRIVATE CORE</div>

        <div class="login-avatar">&#9881;</div>
        
        <h1>La Casa Dark</h1>
        <p>Área de aluno.</p>
        
        {% if error %}
        <div class="login-error" role="alert">{{ error }}</div>
        {% endif %}
        
        <form method="POST" action="/login">
            <input type="hidden" name="_csrf" value="{{ csrf_token }}">
            
            <div class="input-group">
                <label for="email">&#128231; E-mail</label>
                <input type="email" id="email" name="email" placeholder="rudysilvado@gmail.com" required autocomplete="username">
            </div>
            
            <div class="input-group">
                <label for="pass">&#128274; Senha</label>
                <input type="password" id="pass" name="pass" placeholder="••••••••" required autocomplete="current-password">
            </div>
            
            <button type="submit" class="btn-orange">Acessar o Core &rarr;</button>
        </form>
    </div>
</div>
</body>
</html>
